    <style>
        body { margin: 0; background: #f0f2f5; font-family: sans-serif; }
        .video-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 20px; 
            padding: 10px;
        }
        .cam-card { 
            background: #000; 
            border-radius: 15px; 
            aspect-ratio: 16/9; 
            position: relative; 
            overflow: hidden; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .video-player { width: 100%; height: 100%; object-fit: cover; }
        .cam-label { 
            position: absolute; top: 10px; left: 10px; 
            background: rgba(231, 76, 60, 0.9); color: white; 
            padding: 4px 12px; border-radius: 20px; font-size: 11px; z-index: 5; 
        }
    </style>
