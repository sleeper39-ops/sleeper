<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>System Access - Secure Login</title>
    <style>
        body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; background: #f0f2f5; margin: 0; }
        .login-card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #2c3e50; color: white; border: none; border-radius: 6px; cursor: pointer; }
        .forgot { text-align: center; display: block; margin-top: 15px; font-size: 13px; color: #666; text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2 style="text-align:center">Console Login</h2>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="handleLogin()">Sign In</button>
        <a href="#" onclick="handleReset()" class="forgot">Forgot Credentials?</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        // ??? Config ??????????
        const firebaseConfig = { /* ... ??????????? ... */ };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        async function hashText(text) {
            const encoder = new TextEncoder();
            const data = encoder.encode(text);
            const hash = await crypto.subtle.digest('SHA-256', data);
            return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        window.handleLogin = async () => {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const h = await hashText(p);
            
            // ?????? Hash ??? Firebase ??????? (??? Hardcode ??????)
            const snap = await get(ref(db, "settings/adminConfig"));
            const config = snap.val();

            if (u === config.user && h === config.passHash) {
                sessionStorage.setItem('authorized_session', 'true');
                window.location.href = 'index.html';
            } else {
                alert("Access Denied");
            }
        };

        window.handleReset = async () => {
            const resetKey = prompt("Enter Recovery Key:");
            if (!resetKey) return;

            const snap = await get(ref(db, "settings/recovery"));
            const data = snap.val();

            if (await hashText(resetKey) === data.keyHash) {
                alert(`Instruction: ${data.instruction}`);
            } else {
                alert("Invalid Key");
            }
        };
    </script>
</body>
</html>
