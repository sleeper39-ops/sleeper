<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <!-- Tailwind CSS for modern styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  
  <!-- Optimized Google Font Loading -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;700&display=swap" rel="stylesheet">

  <style>
    /* Custom styles */
    body {
      background-color: #f3f4f6; /* A light gray background */
      font-family: 'Sarabun', sans-serif; /* A nice Thai font */
    }
    
    /* Animation for the spinner */
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .spinner {
      animation: spin 1s linear infinite;
    }
    
    /* Style for table headers for better readability */
    th {
        @apply p-3 text-sm font-semibold text-left text-gray-700 bg-gray-200;
    }

    /* Style for table cells */
    td {
        @apply p-3 text-sm text-gray-700 border-b border-gray-200;
    }

    /* The no-scrollbar class has been removed for table wrappers to allow native scrolling if needed */
    /* If you still want to hide scrollbars while allowing scrolling, you can uncomment these lines */
    /* .no-scrollbar::-webkit-scrollbar { display: none; } */
    /* .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; } */

  </style>
</head>
<body class="text-gray-800">

  <div id="app" class="max-w-7xl mx-auto p-4 md:p-6">

  <!-- Header -->
    <header class="mb-6 bg-white p-6 rounded-xl shadow-lg">
      <div class="flex flex-col md:flex-row justify-between items-center">
        <div class="flex items-center justify-between w-full md:w-auto">
          <h1 class="text-3xl md:text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-500 to-teal-400 mr-4">ESOS</h1>
          <p class="text-lg text-gray-600">Easy Submit Online System</p>
        </div>
        <div id="current-date" class="text-md text-gray-500 mt-4 md:mt-0 font-medium"></div>
      </div>
    </header>


    <!-- Navigation Tabs -->
    <nav class="mb-6">
      <div class="border-b border-gray-200">
        <ul class="flex flex-wrap -mb-px text-sm font-medium text-center text-gray-500">
          <li class="mr-2">
            <a href="#" onclick="showTab('submit-tab'); return false;" class="tab-link inline-flex items-center justify-center p-4 border-b-2 border-blue-500 rounded-t-lg text-blue-600">
              <i class="fa-solid fa-file-arrow-up mr-2"></i>ส่งงาน
            </a>
          </li>
          <li class="mr-2">
            <a href="#" onclick="showTab('status-tab'); return false;" class="tab-link inline-flex items-center justify-center p-4 border-b-2 border-transparent rounded-t-lg hover:text-gray-600 hover:border-gray-300">
              <i class="fa-solid fa-list-check mr-2"></i>สถานะส่งงาน
            </a>
          </li>
          <li class="mr-2">
            <a href="#" onclick="showTab('admin-tab'); return false;" class="tab-link inline-flex items-center justify-center p-4 border-b-2 border-transparent rounded-t-lg hover:text-gray-600 hover:border-gray-300">
              <i class="fa-solid fa-user-shield mr-2"></i>Admin
            </a>
          </li>
        </ul>
      </div>
    </nav>

    <!-- Main Content -->
    <main>
      <!-- Loading Spinner -->
      <div id="loading-spinner" class="fixed inset-0 bg-white bg-opacity-75 flex justify-center items-center z-50 hidden">
        <div class="spinner border-4 border-t-4 border-t-blue-500 border-gray-200 rounded-full w-16 h-16"></div>
      </div>
      
      <!-- Notification Toast -->
      <div id="toast" class="fixed top-5 right-5 bg-green-500 text-white py-2 px-4 rounded-lg shadow-lg opacity-0 transition-opacity duration-300">
        <p id="toast-message"></p>
      </div>

      <!-- Tab Content -->
      <div id="submit-tab" class="tab-content bg-white p-6 rounded-xl shadow-lg">
        <!-- Content injected by JS -->
      </div>
      <div id="status-tab" class="tab-content bg-white p-6 rounded-xl shadow-lg hidden">
        <!-- Content injected by JS -->
      </div>
      <div id="admin-tab" class="tab-content bg-white p-6 rounded-xl shadow-lg hidden">
        <!-- Content injected by JS -->
      </div>
    </main>

    <!-- Modal Container -->
    <div id="modal-container">
      <!-- Modal injected by JS -->
    </div>

  </div>

  <script>
    // FIX: Mock google.script.run for local development/preview
    // This prevents "google is not defined" error when running outside of Apps Script.
    if (typeof window.google === 'undefined') {
        console.warn("Running outside of Google Apps Script environment. Mocking 'google.script.run'.");

        // Simulate a "sheet" in memory for the mock backend
        let mockSheetData = [
            {id: '1', timestamp: '2025-06-25 10:00:00', department: 'ฝสส.ฯ', docNumber: 'กค 0405.6/1', subject: 'เรื่องทดสอบที่ 1', userFileUrl: 'https://www.africau.edu/images/default/sample.pdf', adminFileUrl: '', status: 'รอตรวจ'},
            {id: '2', timestamp: '2025-06-25 10:05:00', department: 'ฝขว.ฯ', docNumber: 'กค 0405.6/2', subject: 'เรื่องทดสอบที่ 2 เกี่ยวกับการเงิน', userFileUrl: 'https://www.africau.edu/images/default/sample.pdf', adminFileUrl: 'https://www.africau.edu/images/default/sample.pdf', status: 'อนุมัติ'},
            {id: '3', timestamp: '2025-06-25 10:10:00', department: 'ฝสส.ฯ', docNumber: 'กค 0405.6/3', subject: 'รายงานประจำเดือน', userFileUrl: 'https://www.africau.edu/images/default/sample.pdf', adminFileUrl: '', status: 'ไปแก้มาใหม่'},
            {id: '4', timestamp: '2025-06-25 10:15:00', department: 'ฝยก.ฯ', docNumber: 'กค 0405.6/4', subject: 'การประชุมคณะกรรมการ', userFileUrl: 'https://www.africau.edu/images/default/sample.pdf', adminFileUrl: '', status: 'รอตรวจ'},
            {id: '5', timestamp: '2025-06-25 10:20:00', department: 'ศสน.ฯ', docNumber: 'กค 0405.6/5', subject: 'บันทึกข้อความขออนุมัติ', userFileUrl: 'https://www.africau.edu/images/default/sample.pdf', adminFileUrl: 'https://www.africau.edu/images/default/sample.pdf', status: 'ไม่อนุมัติ'},
        ];

        const createMockRunner = () => {
            let successCallback = () => {};
            let failureCallback = console.error;

            const runner = {
                withSuccessHandler(callback) {
                    successCallback = callback;
                    return this; // Return the runner itself for chaining
                },
                withFailureHandler(callback) {
                    failureCallback = callback;
                    return this; // Return the runner itself for chaining
                }
            };

            // Use a proxy to catch the actual server function call at the end of the chain
            return new Proxy(runner, {
                get(target, prop) {
                    if (prop in target) {
                        return target[prop]; // This handles withSuccessHandler and withFailureHandler
                    }

                    // This handles the server function calls like getSheetData
                    return (...args) => {
                        console.log(`Mocked server call: ${prop} with args:`, args);
                        setTimeout(() => {
                            try {
                                if (prop === 'getSheetData') {
                                    successCallback([...mockSheetData]); // Return a copy to prevent external modification
                                } else if (prop === 'uploadFileAndSaveData') {
                                    const newData = args[0];
                                    const newId = (mockSheetData.length > 0 ? Math.max(...mockSheetData.map(item => parseInt(item.id))) + 1 : 1).toString();
                                    const timestamp = new Intl.DateTimeFormat('th-TH-u-ca-buddhist', {
                                        year: 'numeric', month: '2-digit', day: '2-digit',
                                        hour: '2-digit', minute: '2-digit', second: '2-digit',
                                        timeZone: 'Asia/Bangkok'
                                    }).format(new Date());

                                    mockSheetData.push({
                                        id: newId,
                                        timestamp: timestamp,
                                        department: newData.department,
                                        docNumber: newData.docNumber,
                                        subject: newData.subject,
                                        userFileUrl: newData.fileData.startsWith('data:') ? 'mock-user-file-url-' + newId : '', // Simulate file URL for base64
                                        adminFileUrl: '',
                                        status: 'รอตรวจ'
                                    });
                                    successCallback({ success: true, message: 'ส่งเอกสาร (จำลอง) เรียบร้อยแล้ว' });
                                } else if (prop === 'updateRecord') {
                                    const [recordData, adminFileObject] = args;
                                    const index = mockSheetData.findIndex(item => item.id === recordData.id);
                                    if (index !== -1) {
                                        mockSheetData[index].status = recordData.status;
                                        if (adminFileObject && adminFileObject.fileData) {
                                            mockSheetData[index].adminFileUrl = 'mock-admin-file-url-' + recordData.id; // Simulate admin file URL
                                        } else if (recordData.adminFileUrl === '') { // Explicitly cleared by user
                                            mockSheetData[index].adminFileUrl = '';
                                        }
                                        successCallback({ success: true, message: 'อัปเดตข้อมูล (จำลอง) สำเร็จ' });
                                    } else {
                                        failureCallback(new Error('Record not found for update.'));
                                    }
                                } else if (prop === 'deleteRecord') {
                                    const recordId = args[0];
                                    const initialLength = mockSheetData.length;
                                    mockSheetData = mockSheetData.filter(item => item.id !== recordId);
                                    if (mockSheetData.length < initialLength) {
                                        successCallback({ success: true, message: 'ลบข้อมูล (จำลอง) สำเร็จ' });
                                    } else {
                                        failureCallback(new Error('Record not found for deletion.'));
                                    }
                                } else if (prop === 'deleteMultipleRecords') { // This mock is no longer needed but kept for completeness of mock runner
                                    const idsToDelete = args[0];
                                    const initialLength = mockSheetData.length;
                                    mockSheetData = mockSheetData.filter(item => !idsToDelete.includes(item.id));
                                    if (mockSheetData.length < initialLength) {
                                        successCallback({ success: true, message: `ลบ ${initialLength - mockSheetData.length} รายการ (จำลอง) สำเร็จ` });
                                    } else {
                                        failureCallback(new Error('ไม่พบรายการที่จะลบ (จำลอง)'));
                                    }
                                }
                                else {
                                    successCallback({ success: true, message: 'การดำเนินการ (จำลอง) สำเร็จ' });
                                }
                            } catch (e) {
                                failureCallback(e);
                            }
                        }, 500);
                    };
                }
            });
        };

        window.google = {
            script: {
                get run() {
                    return createMockRunner();
                }
            }
        };
    }

    // ===============================================================
    // ESOS - EASY SUBMIT ONLINE SYSTEM
    // FRONTEND JAVASCRIPT LOGIC
    // ===============================================================

    // --- GLOBAL STATE ---
    let allData = [];
    let currentPage = 1;
    const itemsPerPage = 20; // Correctly defined for 20 items per page
    let debounceTimer; // Debounce timer for search input
    let isDataLoaded = false; // Flag to check if data has been loaded from the backend

    const departments = ["ฝสส.ฯ", "ฝขว.ฯ", "ฝยก.ฯ", "ศสน.ฯ", "ฝปส.ฯ", "ฝกร.ฯ", "ฝยส.ฯ", "ชกส.ฯ", "ฝปพ.ฯ"];

    // --- INITIALIZATION ---
    document.addEventListener('DOMContentLoaded', () => {
      initializeDate();
      loadHtmlPartials(); // Load HTML content into tabs
      initializeForms(); // Initialize forms and listeners AFTER HTML is loaded
      showTab('submit-tab'); // Show the first tab by default
    });

    /**
     * Initializes and updates the current date and time displayed in the header.
     * Uses setInterval to update every second for a live clock effect.
     */
    function initializeDate() {
        function updateClock() {
            const now = new Date();
            const options = {
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
                hour: '2-digit', minute: '2-digit', second: '2-digit',
                timeZone: 'Asia/Bangkok'
            };
            const thaiDateTime = new Intl.DateTimeFormat('th-TH-u-ca-buddhist', options).format(now);
            const currentDateElement = document.getElementById('current-date');
            if (currentDateElement) {
              currentDateElement.textContent = thaiDateTime;
            }
        }

        updateClock(); // Initial call to display immediately
        setInterval(updateClock, 1000); // Update every 1 second
    }

    /**
     * Loads HTML content from script templates into their respective tab containers.
     * This separates the structure from the main HTML for better organization.
     */
    function loadHtmlPartials() {
      const submitTab = document.getElementById('submit-tab');
      const statusTab = document.getElementById('status-tab');
      const adminTab = document.getElementById('admin-tab');
      const modalContainer = document.getElementById('modal-container');

      if (submitTab) submitTab.innerHTML = document.getElementById('submit-form-template').innerHTML;
      if (statusTab) statusTab.innerHTML = document.getElementById('status-view-template').innerHTML;
      if (adminTab) adminTab.innerHTML = document.getElementById('admin-view-template').innerHTML;
      if (modalContainer) modalContainer.innerHTML = document.getElementById('edit-modal-template').innerHTML;
    }

    /**
     * Debounce function to limit the rate at which a function is called.
     * @param {function} func - The function to debounce.
     * @param {number} delay - The delay in milliseconds.
     * @returns {function} The debounced function.
     */
    function debounce(func, delay) {
        return function(...args) {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => func.apply(this, args), delay);
        };
    }

    // Debounced version of renderTables for search inputs
    const debouncedRenderTables = debounce(renderTables, 300);


    /**
     * Initializes form elements and attaches event listeners for form submission,
     * filter changes, and admin actions. Populates department dropdowns.
     */
    function initializeForms() {
      // Add event listener to the submission form
      const submissionForm = document.getElementById('submission-form');
      if (submissionForm) {
        submissionForm.addEventListener('submit', handleFormSubmit);
      }

      // Add event listener for the new "Clear Form" button
      const clearFormBtn = document.getElementById('clear-form-btn');
      if (clearFormBtn) {
        clearFormBtn.addEventListener('click', clearForm);
      }

      // Populate department dropdowns for all elements with class 'department-select'
      const deptSelects = document.querySelectorAll('.department-select');
      deptSelects.forEach(select => {
        // Clear existing options except the first (placeholder) one
        while (select.options.length > 1) {
            select.remove(1);
        }
        departments.forEach(dept => {
          const option = document.createElement('option');
          option.value = dept;
          option.textContent = dept;
          select.appendChild(option);
        });
      });

      // Add event listeners for filters on Status Tab
      const statusFilterDepartment = document.getElementById('status-filter-department');
      if (statusFilterDepartment) {
        statusFilterDepartment.addEventListener('change', renderTables);
      }
      const statusFilterStatus = document.getElementById('status-filter-status');
      if (statusFilterStatus) {
        statusFilterStatus.addEventListener('change', renderTables);
      }
      const statusSearchInput = document.getElementById('status-search-input');
      if (statusSearchInput) {
        statusSearchInput.addEventListener('input', debouncedRenderTables);
      }

      // Add event listeners for filters on Admin Tab (if admin panel is visible)
      const adminFilterDepartment = document.getElementById('admin-filter-department');
      if (adminFilterDepartment) {
        adminFilterDepartment.addEventListener('change', renderTables);
      }
      const adminFilterStatus = document.getElementById('admin-filter-status');
      if (adminFilterStatus) {
        adminFilterStatus.addEventListener('change', renderTables);
      }
      const adminSearchInput = document.getElementById('admin-search-input');
      if (adminSearchInput) {
        adminSearchInput.addEventListener('input', debouncedRenderTables);
      }

      // Add event listeners for admin actions
      const adminLoginBtn = document.getElementById('admin-login-btn');
      if (adminLoginBtn) {
        adminLoginBtn.addEventListener('click', handleAdminLogin);
      }
      const logoutBtn = document.getElementById('logout-btn');
      if (logoutBtn) {
        logoutBtn.addEventListener('click', handleAdminLogout);
      }
      const deleteAllBtn = document.getElementById('delete-all-btn');
      if (deleteAllBtn) {
        deleteAllBtn.addEventListener('click', handleDeleteAll);
      }

      const editForm = document.getElementById('edit-form');
      if (editForm) {
        editForm.addEventListener('submit', handleUpdateRecord);
      }
      
      // Add event listener for 'Enter' key press on password field
      const passwordInput = document.getElementById('admin-password');
      if (passwordInput) { // Check if element exists before adding listener
          passwordInput.addEventListener('keydown', function (event) {
              if (event.key === 'Enter') {
                  event.preventDefault(); // Prevent default form submission if any
                  handleAdminLogin();
              }
          });
      }
    }
    
    /**
     * Clears all fields in the submission form.
     */
    function clearForm() {
        const submissionForm = document.getElementById('submission-form');
        if (submissionForm) {
            submissionForm.reset();
            showToast("ฟอร์มถูกล้างแล้ว", true);
        }
    }

    // --- UI & TAB MANAGEMENT ---
    
    /**
     * Controls which tab content is visible and updates navigation link styles.
     * @param {string} tabId - The ID of the tab content to show (e.g., 'submit-tab', 'status-tab').
     */
    function showTab(tabId) {
      // Hide all tab content
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.add('hidden'));
      // Show the selected tab content
      const selectedTab = document.getElementById(tabId);
      if (selectedTab) {
        selectedTab.classList.remove('hidden');
      }

      // Reset all tab link styles
      document.querySelectorAll('.tab-link').forEach(link => {
        link.classList.remove('text-blue-600', 'border-blue-500');
        link.classList.add('border-transparent', 'hover:text-gray-600', 'hover:border-gray-300');
      });
      
      // Apply active style to the clicked tab link
      const activeLink = document.querySelector(`a[onclick^="showTab('${tabId}')"]`);
      if (activeLink) {
        activeLink.classList.add('text-blue-600', 'border-blue-500');
        activeLink.classList.remove('border-transparent', 'hover:text-gray-600', 'hover:border-gray-300');
      }
      
      // Determine if the currently active tab is a data-displaying tab (Status or Admin Panel)
      const isAdminTab = tabId === 'admin-tab';
      const adminPanel = document.getElementById('admin-panel');
      const isAdminPanelVisible = adminPanel && adminPanel.style.display !== 'none';
      const isDataTab = tabId === 'status-tab' || (isAdminTab && isAdminPanelVisible);
      
      // Only load data from backend if it hasn't been loaded yet or if it's the submit tab (no data needed)
      if (isDataTab && !isDataLoaded) {
        loadData();
      } else if (isDataTab && isDataLoaded) {
        // If data is already loaded, just re-render tables with current filters/search to ensure UI is up-to-date
        renderTables();
      }
      // If it's the submit tab, no data load or table render needed (it's a form)
    }
    
    /**
     * Shows or hides the global loading spinner.
     * @param {boolean} show - True to show, false to hide.
     */
    function showLoading(show) {
      const loadingSpinner = document.getElementById('loading-spinner');
      if (loadingSpinner) {
        loadingSpinner.style.display = show ? 'flex' : 'none';
      }
    }

    /**
     * Displays a toast notification message.
     * @param {string} message - The message to display.
     * @param {boolean} isSuccess - True for a success (green) toast, false for an error (red) toast.
     */
    function showToast(message, isSuccess = true) {
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toast-message');
        
        if (toast && toastMessage) {
            toastMessage.textContent = message;
            // Apply appropriate background color and reset opacity for transition
            toast.className = `fixed top-5 right-5 text-white py-2 px-4 rounded-lg shadow-lg transition-opacity duration-500 ${isSuccess ? 'bg-green-500' : 'bg-red-500'}`;
            toast.classList.remove('opacity-0'); // Make it visible

            // Hide toast after 3 seconds
            setTimeout(() => {
                toast.classList.add('opacity-0');
            }, 3000);
        }
    }

    // --- DATA HANDLING ---

    /**
     * Handles the submission of the document form.
     * Validates file type and size, then sends data to the backend.
     * @param {Event} event - The form submission event.
     */
    function handleFormSubmit(event) {
      event.preventDefault(); // Prevent default form submission
      const form = event.target;
      const fileInput = document.getElementById('file-input');
      const file = fileInput ? fileInput.files[0] : null;

      if (!file) {
        showToast("กรุณาแนบไฟล์เอกสาร", false);
        return;
      }
      // Check file type
      if (file.type !== 'application/pdf') {
        showToast("รองรับเฉพาะไฟล์ .pdf เท่านั้น", false);
        return;
      }
      // Optional: Add file size validation (e.g., max 10MB)
      const MAX_FILE_SIZE_MB = 10;
      if (file.size > MAX_FILE_SIZE_MB * 1024 * 1024) {
          showToast(`ไฟล์มีขนาดใหญ่เกินไป (สูงสุด ${MAX_FILE_SIZE_MB}MB)`, false);
          return;
      }

      showLoading(true); // Show loading spinner

      const reader = new FileReader();
      reader.readAsDataURL(file); // Read file as Data URL (Base64)
      
      reader.onload = () => {
        const formObject = {
          department: form.department.value,
          docNumber: form.docNumber.value,
          subject: form.subject.value,
          fileName: file.name,
          fileData: reader.result // Pass Base64 data to backend
        };

        // Call Google Apps Script backend function
        google.script.run
          .withSuccessHandler(response => {
            showLoading(false); // Hide loading spinner
            if (response.success) {
              showToast(response.message, true);
              form.reset(); // Clear all form fields after successful submission.
              isDataLoaded = false; // Mark data as not loaded to force refresh on next tab switch
              loadData(); // Explicitly reload data after successful submission
              showTab('status-tab'); // Switch to status tab
            } else {
              showToast(response.message, false);
            }
          })
          .withFailureHandler(error => {
            showLoading(false); // Hide loading spinner on error
            showToast("เกิดข้อผิดพลาดในการเชื่อมต่อ: " + error.message, false);
          })
          .uploadFileAndSaveData(formObject); // Call backend function
      };
      reader.onerror = () => {
        showLoading(false); // Hide loading spinner on read error
        showToast("ไม่สามารถอ่านไฟล์ได้", false);
      };
    }

    /**
     * Loads data from the Google Sheet via Apps Script backend.
     * Updates `allData` and re-renders tables.
     */
    function loadData() {
      showLoading(true);
      google.script.run
        .withSuccessHandler(data => {
          allData = data.reverse(); // Store data, reverse for latest first
          currentPage = 1; // Reset to first page
          isDataLoaded = true; // Mark data as loaded
          renderTables(); // Render tables with new data
          showLoading(false);
        })
        .withFailureHandler(error => {
          showLoading(false);
          showToast("ไม่สามารถโหลดข้อมูลได้: " + error.message, false);
        })
        .getSheetData(); // Call backend to get all sheet data
    }
    
    /**
     * Filters `allData` based on current filter and search inputs,
     * then renders the status and admin tables with paginated data.
     */
    function renderTables() {
      let departmentFilter = '';
      let statusFilter = '';
      let searchQuery = ''; 

      // Determine which set of filters and search input to use based on the active tab and admin panel visibility
      const isAdminTabVisible = !document.getElementById('admin-tab').classList.contains('hidden');
      const adminPanel = document.getElementById('admin-panel');
      const isAdminPanelVisible = adminPanel && adminPanel.style.display !== 'none'; // Check if admin-panel exists and is visible

      if (isAdminTabVisible && isAdminPanelVisible) {
        const adminFilterDepartment = document.getElementById('admin-filter-department');
        const adminFilterStatus = document.getElementById('admin-filter-status');
        const adminSearchInput = document.getElementById('admin-search-input');
        
        departmentFilter = adminFilterDepartment ? adminFilterDepartment.value : '';
        statusFilter = adminFilterStatus ? adminFilterStatus.value : '';
        searchQuery = adminSearchInput ? adminSearchInput.value.toLowerCase() : '';
      } else { // Default to status tab filters
        const statusFilterDepartment = document.getElementById('status-filter-department');
        const statusFilterStatus = document.getElementById('status-filter-status');
        const statusSearchInput = document.getElementById('status-search-input');

        departmentFilter = statusFilterDepartment ? statusFilterDepartment.value : '';
        statusFilter = statusFilterStatus ? statusFilterStatus.value : '';
        searchQuery = statusSearchInput ? statusSearchInput.value.toLowerCase() : '';
      }
      
      // Apply filters and search query
      let filteredData = allData.filter(item => {
        const matchesDept = !departmentFilter || item.department === departmentFilter;
        const matchesStatus = !statusFilter || item.status === statusFilter;
        
        const matchesSearch = !searchQuery || 
                               (item.department && item.department.toLowerCase().includes(searchQuery)) ||
                               (item.docNumber && String(item.docNumber).toLowerCase().includes(searchQuery)) ||
                               (item.subject && item.subject.toLowerCase().includes(searchQuery)) ||
                               (item.status && item.status.toLowerCase().includes(searchQuery)) ||
                               (item.timestamp && item.timestamp.toLowerCase().includes(searchQuery));
                               
        return matchesDept && matchesStatus && matchesSearch;
      });
      
      const totalItems = filteredData.length;
      const totalPages = Math.ceil(totalItems / itemsPerPage);
      currentPage = Math.min(currentPage, totalPages) || (totalItems > 0 ? 1 : 0); // Adjust current page if it's out of bounds or no data. If no items, currentPage is 0.
      const startIndex = (currentPage === 0) ? 0 : (currentPage - 1) * itemsPerPage; // Ensure startIndex is 0 if currentPage is 0
      const paginatedData = filteredData.slice(startIndex, startIndex + itemsPerPage);

      // Render for both tables
      renderStatusTable(paginatedData, startIndex);
      renderAdminTable(paginatedData, startIndex);
      renderPagination(totalItems, totalPages);
    }
    
    /**
     * Returns an HTML string for a status badge based on the given status.
     * @param {string} status - The status string.
     * @returns {string} HTML string for the status badge.
     */
    function getStatusBadge(status) {
        switch (status) {
            case 'อนุมัติ': return `<span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-green-100 text-green-800">${status}</span>`;
            case 'รอตรวจ': return `<span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-yellow-100 text-yellow-800">${status}</span>`;
            case 'ไปแก้มาใหม่': return `<span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-blue-100 text-blue-800">${status}</span>`;
            case 'ไม่อนุมัติ': return `<span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-red-100 text-red-800">${status}</span>`;
            default: return `<span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-gray-100 text-gray-800">${status}</span>`;
        }
    }

    /**

     * @param {Array<Object>} data - The array of data items to display.
     * @param {number} startIndex - The starting index for numbering the rows.
     */
    function renderStatusTable(data, startIndex) {

        tableBody.innerHTML = ''; // Clear existing rows

        if (data.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="8" class="text-center text-gray-500 py-4">ไม่พบข้อมูล</td></tr>`;
            return;
        }

        data.forEach((item, index) => {
            const row = `
                <tr>
                    <td class="p-3 text-sm text-gray-700 border-b border-gray-200">${startIndex + index + 1}</td>
                    <td class="p-3 text-sm text-gray-700 border-b border-gray-200">${item.timestamp || '-'}</td>
                    <td class="p-3 text-sm text-gray-700 border-b border-gray-200">${item.department || '-'}</td>
                    <td class="p-3 text-sm text-gray-700 border-b border-gray-200">${item.docNumber || '-'}</td>
                    <td class="p-3 text-sm text-gray-700 border-b border-gray-200 break-words">${item.subject || '-'}</td>
                    <td class="p-3 text-sm text-gray-700 border-b border-gray-200">
                        ${item.userFileUrl ? `<a href="${item.userFileUrl}" target="_blank" class="text-blue-500 hover:underline" title="ดาวน์โหลดไฟล์ที่ส่ง"><i class="fa-solid fa-file-pdf mr-1"></i>Download</a>` : '<span>-</span>'}
                    </td>
                    <td class="p-3 text-sm text-gray-700 border-b border-gray-200">
                        ${item.adminFileUrl ? `<a href="${item.adminFileUrl}" target="_blank" class="text-green-600 hover:underline" title="ดาวน์โหลดไฟล์ตอบกลับจาก Admin"><i class="fa-solid fa-file-circle-check mr-1"></i>Download</a>` : '<span>-</span>'}

            tableBody.innerHTML += row;
        });

    /**
     * Renders pagination controls and information for both status and admin tables.
     * @param {number} totalItems - Total number of filtered items.
     * @param {number} totalPages - Total number of pages based on itemsPerPage.
     */
    function renderPagination(totalItems, totalPages) {
        const paginationControls = document.querySelectorAll('.pagination-controls');
        const paginationInfo = document.querySelectorAll('.pagination-info');

        paginationInfo.forEach(info => {
            info.textContent = `แสดง ${totalItems > 0 ? Math.min((currentPage - 1) * itemsPerPage + 1, totalItems) : 0} ถึง ${Math.min(currentPage * itemsPerPage, totalItems)} จาก ${totalItems} รายการ`;
        });
        
        paginationControls.forEach(controls => {
            controls.innerHTML = `
                <button onclick="changePage(${currentPage - 1})" ${currentPage === 1 || totalPages === 0 ? 'disabled' : ''} class="px-4 py-2 text-sm font-medium text-gray-500 bg-white border border-gray-300 rounded-l-lg hover:bg-gray-100 disabled:opacity-50 disabled:cursor-not-allowed">
                    ก่อนหน้า
                </button>
                <span class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border-t border-b border-gray-300">
                    หน้า ${currentPage} / ${totalPages > 0 ? totalPages : 1}
                </span>
                <button onclick="changePage(${currentPage + 1})" ${currentPage >= totalPages || totalPages === 0 ? 'disabled' : ''} class="px-4 py-2 text-sm font-medium text-gray-500 bg-white border border-gray-300 rounded-r-lg hover:bg-gray-100 disabled:opacity-50 disabled:cursor-not-allowed">
                    ถัดไป
                </button>
            `;
        });
    }

    /**
     * Changes the current page for pagination and re-renders tables.
     * @param {number} page - The page number to navigate to.
     */
    function changePage(page) {
        if (page < 1) return; // Prevent going below page 1
        currentPage = page;
        renderTables(); // Re-render tables with the new page
    }

    /**
     * Opens the edit modal and populates it with the selected record's data.
     * @param {Object} item - The data object of the record to be edited.
     */
    function openEditModal(item) {
        const editRecordId = document.getElementById('edit-record-id');
        const editDocNumberDisplay = document.getElementById('edit-docNumber-display'); // New line
        const editSubjectDisplay = document.getElementById('edit-subject-display');
        const editStatus = document.getElementById('edit-status');
        const existingAdminFile = document.getElementById('existing-admin-file');
        const adminFileInput = document.getElementById('admin-file-input');
        const existingAdminFileLink = document.getElementById('existing-admin-file-link');
        const editModal = document.getElementById('edit-modal');

        if (editRecordId && editDocNumberDisplay && editSubjectDisplay && editStatus && existingAdminFile && adminFileInput && existingAdminFileLink && editModal) { // Updated condition
            editRecordId.value = item.id;
            editDocNumberDisplay.textContent = item.docNumber; // New line
            editSubjectDisplay.textContent = item.subject;
            editStatus.value = item.status;
            existingAdminFile.value = item.adminFileUrl || ''; // Store existing URL

            // Clear file input to allow new file selection
            adminFileInput.value = ''; 
            
            if (item.adminFileUrl) {
              existingAdminFileLink.innerHTML = `<a href="${item.adminFileUrl}" target="_blank" class="text-green-600 hover:underline text-sm" title="ดูไฟล์ที่แนบแล้ว"><i class="fa-solid fa-file-circle-check mr-1"></i>ดูไฟล์ที่แนบแล้ว</a>`;
            } else {
              existingAdminFileLink.innerHTML = ''; // No existing file, clear link
            }

            editModal.classList.remove('hidden'); // Show the modal
        }
    }

    /**
     * Closes the edit modal.
     */
    function closeEditModal() {
        const editModal = document.getElementById('edit-modal');
        if (editModal) {
            editModal.classList.add('hidden');
        }
    }
    
    /**
     * Handles the update record form submission from the edit modal.
     * Sends updated data and potentially a new admin file to the backend.
     * @param {Event} event - The form submission event.
     */
    function handleUpdateRecord(event) {
        event.preventDefault();
        showLoading(true);

        const recordId = document.getElementById('edit-record-id');
        const editStatus = document.getElementById('edit-status');
        const existingAdminFile = document.getElementById('existing-admin-file');
        const adminFileInput = document.getElementById('admin-file-input');

        if (!recordId || !editStatus || !existingAdminFile || !adminFileInput) {
            showToast("เกิดข้อผิดพลาด: ไม่พบองค์ประกอบฟอร์มสำหรับแก้ไข", false);
            showLoading(false);
            return;
        }

        const recordData = {
          id: recordId.value,
          status: editStatus.value,
          // If a new file is uploaded, this existing URL might be overwritten by the backend.
          // We pass it to the backend to know if a file previously existed.
          adminFileUrl: existingAdminFile.value
        };

        const adminFile = adminFileInput.files[0];

        if (adminFile) {
            if (adminFile.type !== 'application/pdf') {
                showToast("รองรับเฉพาะไฟล์ .pdf เท่านั้น", false);
                showLoading(false);
                return;
            }
            const reader = new FileReader();
            reader.readAsDataURL(adminFile);
            reader.onload = () => {
                const adminFileObject = {
                    fileData: reader.result,
                    fileName: adminFile.name
                };
                runUpdateScript(recordData, adminFileObject);
            };
            reader.onerror = () => {
                showLoading(false);
                showToast("ไม่สามารถอ่านไฟล์แนบ Admin ได้", false);
            };
        } else {
            // No new admin file, proceed with existing or no file
            runUpdateScript(recordData, null);
        }
    }

    /**
     * Calls the backend Apps Script function to update a record.
     * @param {Object} recordData - The data for the record to update.
     * @param {Object|null} adminFileObject - Object containing admin file data (fileData, fileName) or null if no file.
     */
    function runUpdateScript(recordData, adminFileObject) {
        google.script.run
            .withSuccessHandler(response => {
                showLoading(false);
                if(response.success){
                    showToast(response.message, true);
                    closeEditModal();
                    isDataLoaded = false; // Mark data as not loaded to force refresh
                    loadData(); // Reload data to show updated record
                } else {
                    showToast(response.message, false);
                }
            })
            .withFailureHandler(error => {
                showLoading(false);
                showToast("เกิดข้อผิดพลาดในการอัปเดต: " + error.message, false);
            })
            .updateRecord(recordData, adminFileObject);
    }
    
    /**
     * Handles the deletion of a single record after confirmation.
     * @param {string} recordId - The ID of the record to delete.
     */
    function handleDeleteRecord(recordId) {
        showCustomConfirm('คุณต้องการลบรายการนี้ใช่หรือไม่? การกระทำนี้ไม่สามารถย้อนกลับได้', () => {
            showLoading(true);
            google.script.run
              .withSuccessHandler(response => {
                showLoading(false);
                if(response.success) {
                  showToast(response.message, true);
                  isDataLoaded = false; // Mark data as not loaded to force refresh
                  loadData(); // Reload data after deletion
                } else {
                  showToast(response.message, false);
                }
              })
              .withFailureHandler(error => {
                showLoading(false);
                showToast("เกิดข้อผิดพลาดในการลบ: " + error.message, false);
              })
              .deleteRecord(recordId);
        });
    }
    
    /**
     * Handles the deletion of all records after a stern confirmation.
     */
    function handleDeleteAll() {
        showCustomConfirm("!! คำเตือน !!\nคุณต้องการลบข้อมูลทั้งหมดในระบบใช่หรือไม่?\nการกระทำนี้ไม่สามารถย้อนกลับได้", () => {
            showLoading(true);
            google.script.run
              .withSuccessHandler(response => {
                showLoading(false);
                if(response.success) {
                  showToast(response.message, true);
                  allData = []; // Clear local cache immediately
                  isDataLoaded = false; // Mark data as not loaded to force refresh
                  renderTables(); // Re-render tables (will show empty)
                } else {
                  showToast(response.message, false);
                }
              })
              .withFailureHandler(error => {
                showLoading(false);
                showToast("เกิดข้อผิดพลาด: " + error.message, false);
              })
              .deleteAllRecords();
        });
    }

    /**
     * Custom confirmation dialog (replaces native alert/confirm).
     * @param {string} message - The message to display.
     * @param {function} onConfirm - Callback function to execute if confirmed.
     * @param {function} [onCancel] - Optional callback function to execute if cancelled.
     */
    function showCustomConfirm(message, onConfirm, onCancel = () => {}) {
        const modalContainer = document.getElementById('modal-container');
        if (!modalContainer) {
            console.error("Modal container not found.");
            return;
        }

        let modalHtml = `
            <div id="custom-confirm-modal" class="fixed inset-0 bg-gray-900 bg-opacity-75 flex items-center justify-center z-50">
                <div class="bg-white p-6 rounded-lg shadow-xl max-w-sm w-full mx-4">
                    <p class="text-gray-800 text-lg mb-6 whitespace-pre-wrap">${message}</p>
                    <div class="flex justify-end space-x-3">
                        <button id="confirm-cancel-btn" class="px-4 py-2 bg-gray-200 text-gray-800 rounded-lg hover:bg-gray-300 focus:outline-none focus:ring-2 focus:ring-gray-400">ยกเลิก</button>
                        <button id="confirm-ok-btn" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-red-400">ยืนยัน</button>
                    </div>
                </div>
            </div>
        `;
        modalContainer.insertAdjacentHTML('beforeend', modalHtml);

        const confirmModal = document.getElementById('custom-confirm-modal');
        const okBtn = document.getElementById('confirm-ok-btn');
        const cancelBtn = document.getElementById('confirm-cancel-btn');

        const closeModal = () => {
            if (confirmModal) confirmModal.remove();
        };

        if (okBtn) {
            okBtn.onclick = () => {
                onConfirm();
                closeModal();
            };
        }

        if (cancelBtn) {
            cancelBtn.onclick = () => {
                onCancel();
                closeModal();
            };
        }

        // Close on outside click, but not for touch devices to avoid accidental dismissal
        if (confirmModal) {
            confirmModal.addEventListener('click', (e) => {
                if (e.target === confirmModal && !('ontouchstart' in window)) {
                    onCancel();
                    closeModal();
                }
            });
        }
    }


  </script>

  <script type="text/html" id="edit-modal-template">
    <div id="edit-modal" class="hidden fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full flex justify-center items-center z-40">
      <div class="relative mx-auto p-5 border w-full max-w-lg shadow-lg rounded-md bg-white">
          <div class="mt-3 text-center">
              <h3 class="text-lg leading-6 font-medium text-gray-900 mb-4">แก้ไขรายการ</h3>
              <form id="edit-form" class="mt-2 px-7 py-3 space-y-4 text-left">
                  <input type="hidden" id="edit-record-id">
                  <input type="hidden" id="existing-admin-file">
                  <div>
                      <label class="font-semibold text-sm text-gray-600">ที่หนังสือ:</label>
                      <p id="edit-docNumber-display" class="mt-1 text-sm text-gray-800 p-2 bg-gray-100 rounded"></p>
                  </div>
                  <div>
                      <label class="font-semibold text-sm text-gray-600">ชื่อเรื่อง:</label>
                      <p id="edit-subject-display" class="mt-1 text-sm text-gray-800 p-2 bg-gray-100 rounded"></p>
                  </div>
                  <div>
                      <label for="edit-status" class="block mb-2 text-sm font-medium text-gray-900">เปลี่ยนสถานะ</label>
                      <select id="edit-status" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5">
                          <option value="รอตรวจ">รอตรวจ</option>
                          <option value="อนุมัติ">อนุมัติ</option>
                          <option value="ไปแก้มาใหม่">ไปแก้มาใหม่</option>
                          <option value="ไม่อนุมัติ">ไม่อนุมัติ</option>
                      </select>
                  </div>
                    <div>
                        <label for="admin-file-input" class="block mb-2 text-sm font-medium text-gray-900">แนบไฟล์ (Admin)</label>
                        <div id="existing-admin-file-link" class="mb-2"></div>
                        <input id="admin-file-input" type="file" accept=".pdf" class="block w-full text-sm text-gray-900 border border-gray-300 rounded-lg cursor-pointer bg-gray-50 focus:outline-none file:mr-4 file:py-2 file:px-4 file:rounded-l-lg file:border-0 file:text-sm file:font-semibold file:bg-green-50 file:text-green-700 hover:file:bg-green-100">
                    </div>
                  <div class="items-center px-4 py-3 flex justify-end gap-x-2">
                      <button type="button" onclick="closeEditModal()" class="px-4 py-2 bg-gray-200 text-gray-800 rounded-md hover:bg-gray-300">ยกเลิก</button>
                      <button type="submit" class="px-4 py-2 bg-blue-500 text-white rounded-md hover:bg-blue-600">บันทึกการเปลี่ยนแปลง</button>
                  </div>
              </form>
          </div>
      </div>
    </div>
  </script>
