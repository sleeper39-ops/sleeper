<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cougar2 — Obs Docks UI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3498db;
            --danger: #e74c3c;
            --success: #27ae60;
            --warning: #f39c12;
            --secondary: #95a5a6;
            --bg-body: #f0f2f5;
            --nav-bg: #0f1923;
            --nav-h: 58px;
            --accent: #3498db;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            display: flex; flex-direction: column;
            font-family: 'Sarabun', sans-serif;
            background: var(--bg-body);
            height: 100vh; overflow: hidden;
        }

        /* ── TOPBAR ── */
        .topbar {
            height: var(--nav-h); background: var(--nav-bg);
            display: flex; align-items: center; padding: 0 20px; gap: 0;
            flex-shrink: 0; box-shadow: 0 2px 16px rgba(0,0,0,0.35);
            position: relative; z-index: 100;
        }
        .topbar-logo {
            font-family: 'Rajdhani', sans-serif; font-size: 1.5rem; font-weight: 700;
            color: white; letter-spacing: 2px; padding-right: 24px; margin-right: 8px;
            border-right: 1px solid rgba(255,255,255,0.1); white-space: nowrap;
            display: flex; align-items: center; gap: 8px;
        }
        .topbar-logo span { color: var(--accent); }
        .topbar-nav {
            display: flex; align-items: center; flex: 1; height: 100%;
            overflow-x: auto; scrollbar-width: none;
        }
        .topbar-nav::-webkit-scrollbar { display: none; }
        .nav-item {
            height: var(--nav-h); display: flex; align-items: center; gap: 7px;
            padding: 0 16px; color: rgba(255,255,255,0.55); font-size: 13px;
            font-weight: 600; cursor: pointer; white-space: nowrap;
            border-bottom: 3px solid transparent;
            transition: color 0.2s, border-color 0.2s, background 0.2s;
            letter-spacing: 0.3px; user-select: none;
        }
        .nav-item i { font-size: 14px; }
        .nav-item:hover { color: white; background: rgba(255,255,255,0.06); }
        .nav-item.active { color: white; border-bottom-color: var(--accent); background: rgba(52,152,219,0.1); }

        /* ปุ่มกลับหน้าหลัก */
        .nav-link {
            height: var(--nav-h); display: flex; align-items: center; gap: 7px;
            padding: 0 16px; color: rgba(255,255,255,0.55); font-size: 13px;
            font-weight: 600; white-space: nowrap; text-decoration: none;
            border-bottom: 3px solid transparent;
            transition: color 0.2s, border-color 0.2s, background 0.2s;
            letter-spacing: 0.3px;
        }
        .nav-link:hover { color: white; background: rgba(255,255,255,0.06); }
        .nav-link i { font-size: 14px; }

        /* ── ปุ่ม Login/Logout ── */
        #auth-btn {
            background: var(--primary); color: white; border: none;
            padding: 5px 14px; border-radius: 6px; cursor: pointer;
            font-weight: 700; font-size: 11px;
            display: inline-flex; align-items: center; gap: 5px;
            transition: 0.2s; font-family: 'Sarabun', sans-serif;
        }
        #auth-btn:hover { filter: brightness(1.1); }

        /* ── CONTENT ── */
        .content-wrap { flex: 1; overflow: hidden; position: relative; }
        .page-content {
            display: none; height: 100%;
            animation: fadeUp 0.3s ease;
        }
        .page-content.active { display: flex; flex-direction: column; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .page-content iframe { flex: 1; border: none; width: 100%; height: 100%; }

        #dash-page { padding: 28px 30px; overflow-y: auto; }

        .page-title {
            font-family: 'Rajdhani', sans-serif; font-size: 1.3rem; font-weight: 700;
            color: #1a2a3a; letter-spacing: 1px; margin-bottom: 22px;
            display: flex; align-items: center; gap: 10px;
        }
        .page-title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(to right, #ddd, transparent); }
        .dashboard-stats {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px; margin-bottom: 28px;
        }
        .stat-box {
            background: white; padding: 20px 18px; border-radius: 14px; text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05); border: 1px solid #eee;
            display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 6px;
        }
        .stat-box i { font-size: 1.6rem; }
        .stat-value { font-size: 1.15rem; font-weight: 700; color: #111; }
        .stat-label { font-size: 11px; color: #999; }

        #admin-panel {
            display: none; background: white; padding: 22px; border-radius: 14px;
            border: 1px solid #eee; margin-bottom: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }
        .admin-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 18px; border-bottom: 1px solid #f0f0f0; padding-bottom: 14px;
        }
        .admin-header h3 { font-size: 15px; color: #222; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 12px; align-items: flex-end; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-size: 11px; font-weight: 700; color: #666; }
        .input-group input {
            padding: 8px 10px; border: 1px solid #e0e0e0; border-radius: 8px;
            outline: none; font-size: 13px; transition: border-color 0.2s;
        }
        .input-group input:focus { border-color: var(--primary); }
        .btn-action {
            padding: 9px 16px; border-radius: 8px; border: none; font-weight: 700;
            cursor: pointer; color: white; height: 36px; font-size: 13px;
            font-family: 'Sarabun', sans-serif;
        }
        .download-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; padding-bottom: 40px; }
        .download-card {
            background: white; border-radius: 14px; overflow: hidden;
            box-shadow: 0 3px 12px rgba(0,0,0,0.06); display: flex; flex-direction: column;
            position: relative; transition: transform 0.2s, box-shadow 0.2s;
        }
        .download-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
        .download-count-badge {
            position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.6); color: white;
            padding: 3px 8px; border-radius: 6px; font-size: 11px;
            display: flex; align-items: center; gap: 4px; backdrop-filter: blur(4px); z-index: 1;
        }
        .card-img-container { width: 100%; height: 160px; background: #222; cursor: zoom-in; overflow: hidden; }
        .card-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
        .card-img-container:hover .card-img { transform: scale(1.04); }
        .download-info { padding: 14px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; }
        .download-info h4 { margin: 0 0 12px 0; font-size: 14px; color: #333; min-height: 38px; display: flex; align-items: center; justify-content: center; }
        .btn-download {
            margin-top: auto; display: block; width: 100%; padding: 10px; border-radius: 8px;
            font-weight: 700; border: none; cursor: pointer; transition: 0.2s; color: white;
            background: var(--primary); text-decoration: none;
            font-family: 'Sarabun', sans-serif; font-size: 13px;
        }
        .btn-download:hover { filter: brightness(1.1); }
        .admin-actions {
            display: none; justify-content: space-between; align-items: center;
            padding: 7px 6px; background: #fafafa; border-top: 1px solid #f0f0f0; gap: 4px;
        }
        .btn-admin-tool {
            background: white; border: 1px solid #ddd; border-radius: 5px; cursor: pointer;
            font-size: 10px; font-weight: 700; display: flex; align-items: center;
            justify-content: center; gap: 3px; padding: 5px 4px; transition: all 0.2s;
            flex: 1; white-space: nowrap; text-decoration: none; font-family: 'Sarabun', sans-serif;
        }
        .btn-edit-tool  { color: #3498db; border-color: #3498db; }
        .btn-reset-tool { color: #f39c12; border-color: #f39c12 !important; }
        .btn-lock-tool  { color: #7f8c8d; border-color: #7f8c8d; }
        .btn-lock-tool.active { color: #e74c3c; border-color: #e74c3c; background: #fff5f5; }
        .btn-delete-tool { color: #e74c3c; border-color: #e74c3c; }
        .btn-admin-tool:hover { background: #f5f5f5; }
        .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background: var(--danger); }
        input:checked + .slider:before { transform: translateX(16px); }
        .lightbox { display: none; position: fixed; z-index: 9999; inset: 0; background: rgba(0,0,0,0.92); align-items: center; justify-content: center; }
        .lightbox img { max-width: 90%; max-height: 90%; border-radius: 12px; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 9999; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 32px 28px; border-radius: 18px; width: 320px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .login-card h3 { margin-bottom: 20px; font-size: 17px; }
        .login-card input { width: 100%; padding: 11px 12px; margin: 6px 0; border: 1px solid #e0e0e0; border-radius: 9px; font-size: 14px; outline: none; font-family: 'Sarabun', sans-serif; }
    </style>
</head>
<body>

<!-- LOGIN MODAL -->
<div id="loginModal" class="modal-overlay">
    <div class="login-card">
        <h3><i class="fas fa-user-shield" style="color:var(--primary);margin-right:8px;"></i>Admin Login</h3>
        <input type="text"     id="loginUser" placeholder="Username">
        <input type="password" id="loginPass" placeholder="Password">
        <button onclick="window.performLogin()" style="width:100%;padding:11px;background:var(--primary);color:white;border:none;border-radius:9px;cursor:pointer;font-weight:700;font-size:14px;margin-top:10px;font-family:'Sarabun',sans-serif;">เข้าสู่ระบบ</button>
        <button onclick="document.getElementById('loginModal').style.display='none'" style="background:none;border:none;color:#aaa;margin-top:12px;cursor:pointer;font-size:13px;">ยกเลิก</button>
    </div>
</div>

<!-- TOP NAV BAR -->
<nav class="topbar">
    <div class="topbar-logo">
        <i class="fas fa-dog" style="color:var(--accent);font-size:1.1rem;"></i>
        COUGAR<span>2</span>
    </div>
    <div class="topbar-nav">
        <a   class="nav-link"        href="index.html"                                               ><i class="fas fa-home"></i> หน้าหลัก</a>
        <div class="nav-item"        id="nav-resume"   onclick="window.showPage('resume-page', this)"><i class="fas fa-id-card"></i> Resume</div>
        <div class="nav-item"        id="nav-edoc"     onclick="window.showPage('edoc-page', this)"  ><i class="fas fa-file-alt"></i> E-doc</div>     
        <div class="nav-item"        id="nav-live"     onclick="window.showPage('live-page', this)"  ><i class="fas fa-video"></i> กล้องสด</div>
        <div class="nav-item"        id="nav-cal"      onclick="window.showPage('calendar-page', this)"><i class="fas fa-calendar-alt"></i> ปฏิทิน</div>
        <div class="nav-item active" id="nav-dash"     onclick="window.showPage('dash-page', this)"  ><i class="fas fa-boxes-stacked"></i> Obs Docks UI</div>
    </div>
</nav>

<!-- CONTENT -->
<div class="content-wrap">
    <div id="dash-page" class="page-content active">
        <div class="page-title"><i class="fas fa-home" style="color:var(--primary);"></i> Obs Docks UI</div>
        <div class="dashboard-stats">
            <div class="stat-box">
                <i class="fas fa-clock" style="color:#2ecc71;"></i>
                <div class="stat-value" id="dash-time2">00:00:00</div>
                <div class="stat-label">เวลาปัจจุบัน</div>
            </div>
            <div class="stat-box">
                <i class="fas fa-folder-open" style="color:#3498db;"></i>
                <div class="stat-value" id="dash-count">0 รายการ</div>
                <div class="stat-label">ไฟล์ในระบบ</div>
            </div>
            <div class="stat-box">
                <i class="fas fa-shield-alt" id="status-icon" style="color:#95a5a6;"></i>
                <div class="stat-value" id="dash-status">Guest Mode</div>
                <div class="stat-label">โหมดการใช้งาน</div>
            </div>
            <div class="stat-box">
                <i class="fas fa-user-cog" style="color:var(--primary);"></i>
                <button id="auth-btn" onclick="window.toggleAuth()">
                    <i class="fas fa-sign-in-alt"></i> Admin Login
                </button>
                <div class="stat-label">ระบบแอดมิน</div>
            </div>
        </div>

        <div id="admin-panel">
            <div class="admin-header">
                <h3><i class="fas fa-tools" style="color:var(--warning);margin-right:8px;"></i>Admin Control Panel</h3>
                <div style="display:flex;align-items:center;gap:14px;">
                    <div style="display:flex;align-items:center;gap:8px;">
                        <span style="font-size:11px;font-weight:700;color:var(--danger);">Lock Downloads</span>
                        <label class="switch"><input type="checkbox" id="globalLock" onchange="window.toggleGlobalLock()"><span class="slider"></span></label>
                    </div>
                    <button onclick="window.resetAllCounts()" style="background:var(--warning);color:white;border:none;padding:6px 12px;border-radius:7px;font-size:11px;cursor:pointer;font-weight:700;display:flex;align-items:center;gap:5px;font-family:'Sarabun',sans-serif;"><i class="fas fa-sync-alt"></i> รีเซ็ตทั้งหมด</button>
                </div>
            </div>
            <div class="form-row">
                <input type="hidden" id="editKey">
                <div class="input-group"><label>ชื่อไฟล์</label><input type="text" id="itemName" placeholder="ระบุชื่อ..."></div>
                <div class="input-group"><label>ลิงก์รูป</label><input type="text" id="itemImg"  placeholder="URL รูป..."></div>
                <div class="input-group"><label>ลิงก์โหลด</label><input type="text" id="itemLink" placeholder="URL ดาวน์โหลด..."></div>
                <div style="display:flex;gap:8px;">
                    <button onclick="window.saveItem()"  id="btn-save" class="btn-action" style="background:var(--success);">บันทึก</button>
                    <button onclick="window.resetForm()" class="btn-action" style="background:var(--secondary);">ยกเลิก</button>
                </div>
            </div>
        </div>

        <div id="download-list" class="download-grid"></div>
    </div>
    <div id="resume-page"   class="page-content"><iframe src="resume.html"></iframe></div>
    <div id="edoc-page"     class="page-content"><iframe src="e-doc.html"></iframe></div>
    <div id="live-page"     class="page-content"><iframe src="cctv.html"></iframe></div>
    <div id="calendar-page" class="page-content"><iframe src="calendar.html"></iframe></div>

</div>

<div id="imgLightbox" class="lightbox" onclick="this.style.display='none'"><img id="lightboxImg"></div>

<script>
    window.syncAuthBtns = function(isAdmin) {
        const btn = document.getElementById('auth-btn');
        if (btn) {
            btn.innerHTML        = isAdmin ? '<i class="fas fa-sign-out-alt"></i> Logout' : '<i class="fas fa-sign-in-alt"></i> Admin Login';
            btn.style.background = isAdmin ? 'var(--danger)' : 'var(--primary)';
        }
        const statusEl   = document.getElementById('dash-status');
        const statusIcon = document.getElementById('status-icon');
        if (statusEl)   statusEl.innerText      = isAdmin ? 'Admin Mode' : 'Guest Mode';
        if (statusIcon) {
            statusIcon.style.color = isAdmin ? '#2ecc71' : '#95a5a6';
            statusIcon.className   = isAdmin ? 'fas fa-user-shield' : 'fas fa-shield-alt';
        }
    };

    window.showPage = function(id, el) {
        document.querySelectorAll('.page-content').forEach(function(p) {
            p.classList.remove('active');
        });
        var pg = document.getElementById(id);
        if (pg) pg.classList.add('active');
        document.querySelectorAll('.nav-item').forEach(function(a) {
            a.classList.remove('active');
        });
        if (el) el.classList.add('active');
    };

    function tick() {
        var el = document.getElementById('dash-time2');
        if (el) el.innerText = new Date().toLocaleTimeString('th-TH');
    }
    tick();
    setInterval(tick, 1000);

    window.addEventListener('load', function() {
        function patchFn(name) {
            var orig = window[name];
            if (!orig) return;
            window[name] = function() {
                orig.apply(this, arguments);
                setTimeout(function() {
                    var adminPanel = document.getElementById('admin-panel');
                    window.syncAuthBtns(adminPanel && adminPanel.style.display !== 'none');
                }, 80);
            };
        }
        patchFn('toggleAuth');
        patchFn('performLogin');
    });
</script>
<script type="module" src="script.js"></script>
</body>
</html>
