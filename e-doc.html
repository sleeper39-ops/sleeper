<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Document Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Sarabun', sans-serif; 
            background: #f8fafc;
            color: #334155;
            min-height: 100vh;
        }
        /* Subtle mesh gradient overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse 600px 400px at 10% 10%, rgba(99, 102, 241, 0.06) 0%, transparent 70%),
                radial-gradient(ellipse 500px 500px at 90% 50%, rgba(168, 85, 247, 0.04) 0%, transparent 70%),
                radial-gradient(ellipse 400px 300px at 50% 95%, rgba(52, 211, 153, 0.04) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .doc-card { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            position: relative;
        }
        .doc-card:hover { 
            border-color: rgba(99, 102, 241, 0.35); 
            transform: translateY(-2px); 
            box-shadow: 0 8px 30px -8px rgba(99, 102, 241, 0.12), 0 0 0 1px rgba(99, 102, 241, 0.08); 
        }

        /* Stat card */
        .stat-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
        }
        .stat-card:hover {
            border-color: #c7d2fe;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px -6px rgba(99, 102, 241, 0.1);
        }

        .swal2-input, .swal2-file, .swal2-select { 
            font-family: 'Sarabun', sans-serif !important; 
            border-radius: 12px !important; 
            border: 1px solid #e2e8f0 !important;
            box-shadow: none !important;
        }
        .swal2-input:focus, .swal2-file:focus, .swal2-select:focus {
            border-color: #6366f1 !important;
        }

        /* SVG icon size */
        .type-icon-svg { 
            width: 44px; 
            height: 44px; 
            flex-shrink: 0; 
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
            transition: transform 0.2s ease;
        }
        .doc-card:hover .type-icon-svg {
            transform: scale(1.08);
        }
        .type-icon-svg svg { 
            width: 44px; 
            height: 44px; 
            display: block; 
        }

        /* Lightbox styling */
        #lightbox { 
            display:none; 
            position:fixed; 
            inset:0; 
            z-index:9999; 
            background:rgba(15, 23, 42, 0.7); 
            backdrop-filter: blur(12px);
            align-items:center; 
            justify-content:center; 
            flex-direction:column; 
            gap:16px; 
        }
        #lightbox.open { display:flex; }
        #lightbox-close { 
            position:absolute; top:20px; right:24px; 
            background:rgba(255,255,255,0.15); border:none; color:#fff; 
            font-size:20px; cursor:pointer; border-radius:50%; 
            width:44px; height:44px; display:flex; align-items:center; justify-content:center; 
            transition: all 0.2s; z-index:10; border: 1px solid rgba(255,255,255,0.1);
        }
        #lightbox-close:hover { background:rgba(255,255,255,0.3); transform: scale(1.05); }

        /* Action buttons */
        .action-btn {
            padding: 8px 18px; border-radius: 10px; font-size: 12px; font-weight: 600;
            transition: all 0.2s ease; display: inline-flex; align-items: center; gap: 6px;
            border: 1px solid transparent;
        }
        .action-btn-view {
            background: #eef2ff; color: #6366f1; border-color: #e0e7ff;
        }
        .action-btn-view:hover {
            background: #e0e7ff; color: #4f46e5; border-color: #c7d2fe;
        }
        .action-btn-dl {
            background: #ecfdf5; color: #059669; border-color: #d1fae5;
        }
        .action-btn-dl:hover {
            background: #d1fae5; color: #047857; border-color: #a7f3d0;
        }

        @keyframes spin { to { transform:rotate(360deg); } }
        @keyframes fadeUp { 
            from { opacity: 0; transform: translateY(12px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .fade-up { animation: fadeUp 0.5s ease forwards; }
    </style>
</head>
<body class="antialiased">

            </div>

function getIconHTML(docType) {
    const type = (docType||'').toLowerCase();
    const s = typeStyle[type] || typeStyle.default;
    const svgKey = s.svgKey || type;
    const svg = ICON_SVG[svgKey] || ICON_SVG['default'];
    return `<div class="type-icon-svg" title="${docType}">${svg}</div>`;
}

function toThaiDate(raw) {
    if (!raw) return '-';
    let day, month, year;
    const isoMatch = String(raw).match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (isoMatch) {
        year = parseInt(isoMatch[1]); month = parseInt(isoMatch[2]); day = parseInt(isoMatch[3]);
    } else {
        const d = new Date(raw);
        if (!isNaN(d.getTime())) { day=d.getDate(); month=d.getMonth()+1; year=d.getFullYear(); }
        else return String(raw);
    }
    if (year < 2500) year += 543;
    return `${day}-${month}-${year}`;
}

function toTimestamp(raw) {
    if (!raw) return 0;
    const isoMatch = String(raw).match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (isoMatch) return new Date(`${isoMatch[1]}-${isoMatch[2]}-${isoMatch[3]}`).getTime();
    const d = new Date(raw);
    return isNaN(d.getTime()) ? 0 : d.getTime();
}

function toDrivePreviewUrl(url) {
    const m = url.match(/drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]{10,})/);
    if (m) return 'https://drive.google.com/file/d/' + m[1] + '/preview';
    const m2 = url.match(/[?&]id=([a-zA-Z0-9_-]{10,})/);
    if (m2) return 'https://drive.google.com/file/d/' + m2[1] + '/preview';
    return url;
}

function openLightbox(url) {
    const previewUrl = toDrivePreviewUrl(url);
    const frame = document.getElementById('lightbox-frame');
    const spinner = document.getElementById('lightbox-spinner');
    spinner.style.display = 'flex';
    frame.src = previewUrl;
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
}

function closeLightbox(e, force=false) {
    if (force || (e && e.target === document.getElementById('lightbox'))) {
        document.getElementById('lightbox').classList.remove('open');
        document.getElementById('lightbox-frame').src = '';
        document.getElementById('lightbox-spinner').style.display = 'flex';
        document.body.style.overflow = '';
    }
}
document.addEventListener('keydown', e => { if(e.key==='Escape') closeLightbox(null,true); });

async function init() { 
    await loadDataFromSheet(); 
}

async function loadDataFromSheet() {
    try {
        const res = await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({action:'getList'}) });
        const result = await res.json();
        if (result.status === 'success') {
            documents = result.data.sort((a,b) => toTimestamp(b.date) - toTimestamp(a.date));
            updateStats();
            updateCategoryDropdown();
            renderList();
        }
    } catch(err) { console.error("Fetch Error:", err); }
}

function updateStats() {
    const total = documents.length;
    const pdfs = documents.filter(d => (d.type||'').toLowerCase() === 'pdf').length;
    const excels = documents.filter(d => ['xlsx','xls','csv'].includes((d.type||'').toLowerCase())).length;
    const words = documents.filter(d => ['doc','docx'].includes((d.type||'').toLowerCase())).length;
    const ppts = documents.filter(d => ['ppt','pptx'].includes((d.type||'').toLowerCase())).length;
    const images = documents.filter(d => IMAGE_TYPES.has((d.type||'').toLowerCase())).length;
    const others = total - pdfs - excels - words - ppts - images;
    
    document.getElementById('statTotal').innerText = total;
    document.getElementById('statPdf').innerText = pdfs;
    document.getElementById('statExcel').innerText = excels;
    document.getElementById('statWord').innerText = words;
    document.getElementById('statPpt').innerText = ppts;
    document.getElementById('statImage').innerText = images;
    document.getElementById('statOther').innerText = others;
}

function renderList() {
    const container = document.getElementById("docList");
    const empty = document.getElementById("emptyState");
    const search = document.getElementById("searchInput").value.toLowerCase();
    const cat = document.getElementById("filterCategory").value;

    const filtered = documents.filter(d =>
        d.name.toLowerCase().includes(search) && (cat === "" || d.category === cat)
    );

    container.innerHTML = "";
    if (filtered.length === 0) {
        empty.classList.remove('hidden');
    } else {
        empty.classList.add('hidden');
        filtered.forEach(doc => {
            const isImage = IMAGE_TYPES.has((doc.type||'').toLowerCase());
            const displayDate = toThaiDate(doc.date);

            const deleteBtn = isAdmin ? `
                <button onclick="deleteDoc('${doc.id}')" class="absolute top-3 right-3 w-8 h-8 bg-rose-50 text-rose-400 hover:bg-rose-500 hover:text-white rounded-full transition-all duration-200 flex items-center justify-center border border-rose-200 z-10">
                    <i class="fas fa-trash-can text-xs"></i>
                </button>` : '';

            const actionButtons = isImage ? `
                <div class="flex items-center gap-2 shrink-0">
                    <button onclick="openLightbox('${doc.url}')" class="action-btn action-btn-view">
                        <i class="fas fa-image"></i> ดูรูปภาพ
                    </button>
                    <a href="${doc.url}" target="_blank" class="action-btn action-btn-dl">
                        <i class="fas fa-download"></i> ดาวน์โหลด
                    </a>
                </div>` : `
                <div class="flex items-center gap-2 shrink-0">
                    <a href="${doc.url}" target="_blank" class="action-btn action-btn-view">
                        <i class="fas fa-eye"></i> ดูตัวอย่าง
                    </a>
                    <a href="${doc.url}" target="_blank" class="action-btn action-btn-dl">
                        <i class="fas fa-download"></i> ดาวน์โหลด
                    </a>
                </div>`;

            container.innerHTML += `
                <div class="doc-card bg-white p-5 rounded-2xl flex flex-row items-center gap-5 overflow-hidden border border-slate-200/60 shadow-sm relative">
                    ${deleteBtn}
                    ${getIconHTML(doc.type)}
                    <div class="min-w-0 flex-1">
                        <h4 class="font-bold text-slate-700 text-sm leading-snug mb-1 hover:text-indigo-600 transition truncate" title="${doc.name}">${doc.name}</h4>
                        <div class="flex items-center gap-1.5 flex-wrap">
                            <span class="inline-block text-[9px] font-bold text-indigo-500 bg-indigo-50 px-2.5 py-0.5 rounded-md uppercase tracking-wider border border-indigo-100">${doc.category}</span>
                            <span class="inline-block text-[9px] font-bold text-slate-500 bg-slate-100 px-2.5 py-0.5 rounded-md uppercase tracking-wider">${(doc.type||'unknown').toUpperCase()}</span>
                            <span class="text-[10px] text-slate-400 ml-1"><i class="far fa-calendar-alt mr-0.5"></i> ${displayDate}</span>
                        </div>
                    </div>
                    ${actionButtons}
                </div>`;
        });
    }
}

function updateCategoryDropdown() {
    const select = document.getElementById("filterCategory");
    const currentVal = select.value;
    const defaultCats = ["เอกสาร","รูปภาพ","มัลติมีเดีย"];
    const dynamicCats = [...new Set(documents.map(d => d.category))];
    const allCats = [...new Set([...defaultCats, ...dynamicCats])];
    select.innerHTML = '<option value="">ทั้งหมด</option>';
    allCats.forEach(c => { if(c) select.innerHTML += `<option value="${c}">${c}</option>`; });
    select.value = currentVal;
}

function filterData() { 
    renderList(); 
}

async function toggleAdmin() {
    if (!isAdmin) {
        const { value: password } = await Swal.fire({
            title: 'รหัสผ่านแอดมิน', 
            input: 'password',
            inputPlaceholder: 'กรอกรหัสผ่านเพื่อจัดการระบบ',
            showCancelButton: true, 
            confirmButtonText: 'ยืนยัน', 
            confirmButtonColor: '#6366f1',
            cancelButtonText: 'ยกเลิก'
        });
        if (password) {
            Swal.fire({ title: 'กำลังตรวจสอบ...', didOpen: () => Swal.showLoading() });
            try {
                const res = await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({action:'checkAuth', password}) });
                const r = await res.json();
                if (r.status === 'success') { 
                    isAdmin = true; 
                    applyAdminUI(); 
                    Swal.fire({icon:'success', title:'เข้าสู่โหมดแอดมินเรียบร้อย', timer:1200, showConfirmButton:false}); 
                } else {
                    Swal.fire('ล้มเหลว', 'รหัสผ่านแอดมินไม่ถูกต้อง', 'error');
                }
            } catch(e) { Swal.fire('Error', 'การเชื่อมต่อเซิร์ฟเวอร์ผิดพลาด', 'error'); }
        }
    } else { 
        isAdmin = false; 
        applyAdminUI(); 
    }
}

function applyAdminUI() {
    document.getElementById("adminBadge").classList.toggle('hidden', !isAdmin);
    document.getElementById("addBtnArea").classList.toggle('hidden', !isAdmin);
    const btn = document.getElementById("adminBtn");
    btn.innerHTML = isAdmin ? '<i class="fas fa-sign-out-alt"></i> <span>ออกจากโหมดแอดมิน</span>' : '<i class="fas fa-cog"></i> <span>จัดการระบบ</span>';
    btn.className = isAdmin 
        ? 'bg-amber-50 hover:bg-amber-100 text-amber-600 hover:text-amber-700 px-5 py-2.5 rounded-xl text-sm font-semibold transition-all duration-200 flex items-center gap-2 border border-amber-200' 
        : 'bg-slate-100 hover:bg-slate-200 text-slate-600 hover:text-slate-800 px-5 py-2.5 rounded-xl text-sm font-semibold transition-all duration-200 flex items-center gap-2 border border-slate-200';
    renderList();
}

async function addDocument() {
    let uploadType = 'file';
    const { value: formValues } = await Swal.fire({
        title: 'เพิ่มข้อมูลใหม่',
        html: `<div id="swal-container" class="text-left mt-3">
            <div class="flex justify-between items-center mb-2">
                <label id="input-label" class="text-xs font-bold text-slate-400 uppercase tracking-wider">1. เลือกไฟล์ (ไม่เกิน 20MB)</label>
                <button type="button" id="toggle-method" class="text-xs text-indigo-500 font-bold hover:text-indigo-600">สลับไปวางลิงก์แทน</button>
            </div>
            <div id="file-input-area" class="w-full">
                <input id="swal-file" type="file" class="swal2-file !m-0 !w-full !p-2 !text-sm border border-slate-200 rounded-xl">
            </div>
            <div id="link-input-area" class="hidden w-full">
                <input id="swal-link" class="swal2-input !m-0 !w-full !p-2 !text-sm border border-slate-200 rounded-xl" placeholder="วางลิงก์ไฟล์หรือเอกสาร...">
            </div>
            <div class="mt-4">
                <label class="text-xs font-bold text-slate-400 uppercase tracking-wider">2. หมวดหมู่เอกสาร</label>
                <select id="swal-cat" class="swal2-select !m-0 !mt-1.5 !w-full !p-2.5 !text-sm bg-slate-50 border border-slate-200 rounded-xl cursor-pointer">
                    <option value="เอกสาร">เอกสาร</option>
                    <option value="รูปภาพ">รูปภาพ</option>
                    <option value="มัลติมีเดีย">มัลติมีเดีย</option>
                </select>
            </div></div>`,
        showCancelButton: true, 
        confirmButtonText: 'บันทึกข้อมูล',
        confirmButtonColor: '#6366f1',
        cancelButtonText: 'ยกเลิก',
        didOpen: () => {
            const t = document.getElementById('toggle-method');
            t.onclick = () => {
                uploadType = uploadType==='file' ? 'link' : 'file';
                document.getElementById('file-input-area').classList.toggle('hidden');
                document.getElementById('link-input-area').classList.toggle('hidden');
                document.getElementById('input-label').innerText = uploadType==='file' ? '1. เลือกไฟล์ (ไม่เกิน 20MB)' : '1. วางลิงก์สตรีม/ลิงก์ไดรฟ์';
                t.innerText = uploadType==='file' ? 'สลับไปวางลิงก์แทน' : 'สลับไปอัปโหลดไฟล์';
            };
        },
        preConfirm: () => {
            const cat = document.getElementById('swal-cat').value;
            if (uploadType==='file') {
                const file = document.getElementById('swal-file').files[0];
                if (!file) return Swal.showValidationMessage('กรุณาเลือกไฟล์ที่จะอัปโหลด');
                if (file.size > 20*1024*1024) return Swal.showValidationMessage('ไฟล์มีขนาดเกิน 20MB');
                return { type:'file', file, category:cat };
            } else {
                const link = document.getElementById('swal-link').value;
                if (!link||!link.includes('http')) return Swal.showValidationMessage('กรุณากรอก URL ลิงก์ที่ถูกต้อง');
                return { type:'link', link, category:cat };
            }
        }
    });
    if (formValues) {
        if (formValues.type==='file') uploadProcess(formValues.file, formValues.category);
        else saveLinkProcess(formValues.link, formValues.category);
    }
}

async function uploadProcess(file, category) {
    let timerInterval;
    Swal.fire({
        title: 'กำลังอัปโหลดไฟล์...',
        html: `<div class="mt-3">
            <div class="w-full bg-slate-100 rounded-full h-4 relative overflow-hidden">
                <div id="upload-progress-bar" class="bg-gradient-to-r from-indigo-500 to-purple-500 h-full transition-all duration-300" style="width:0%"></div>
            </div>
            <p id="upload-text" class="text-sm font-bold mt-2 text-slate-500">0%</p>
        </div>`,
        allowOutsideClick: false, 
        showConfirmButton: false,
        didOpen: () => {
            let p=0;
            timerInterval = setInterval(()=>{ 
                if(p<90){
                    p+=5; 
                    document.getElementById('upload-progress-bar').style.width=p+'%'; 
                    document.getElementById('upload-text').innerText=p+'%'; 
                } 
            },400);
        }
    });
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = async () => {
        try {
            const res = await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'upload',base64:reader.result,fileName:file.name,category})});
            finishProcess(await res.json(), timerInterval);
        } catch(e) { finishProcess({status:'error',message:e.message}, timerInterval); }
    };
}

async function saveLinkProcess(link, category) {
    Swal.fire({ title:'กำลังบันทึกข้อมูลลิงก์...', didOpen:()=>Swal.showLoading(), allowOutsideClick: false, showConfirmButton: false });
    try {
        const res = await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'upload',base64:'link',fileName:link,category})});
        finishProcess(await res.json());
    } catch(e) { finishProcess({status:'error',message:e.message}); }
}

async function deleteDoc(id) {
    const result = await Swal.fire({
        title:'ยืนยันการลบเอกสาร?', 
        text:'เอกสารนี้จะถูกลบออกจากฐานข้อมูลอย่างถาวร', 
        icon:'warning',
        showCancelButton:true, 
        confirmButtonColor:'#ef4444', 
        cancelButtonColor:'#94a3b8',
        confirmButtonText:'ลบเลย', 
        cancelButtonText:'ยกเลิก'
    });
    if (result.isConfirmed) {
        Swal.fire({title:'กำลังลบเอกสาร...', didOpen:()=>Swal.showLoading(), allowOutsideClick: false, showConfirmButton: false});
        try {
            const res = await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'delete',id})});
            const r = await res.json();
            if (r.status==='success') { 
                Swal.fire({icon:'success',title:'ลบเอกสารสำเร็จ',timer:1200,showConfirmButton:false}); 
                loadDataFromSheet(); 
            } else throw new Error(r.message);
        } catch(e) { Swal.fire('ล้มเหลว',e.message,'error'); }
    }
}

function finishProcess(res, interval=null) {
    if (interval) clearInterval(interval);
    if (res.status==='success') {
        if(document.getElementById('upload-progress-bar')) {
            document.getElementById('upload-progress-bar').style.width='100%';
            document.getElementById('upload-text').innerText='100%';
        }
        setTimeout(()=>{ 
            Swal.fire({icon:'success',title:'บันทึกสำเร็จ!',timer:1500,showConfirmButton:false}); 
            loadDataFromSheet(); 
        },500);
    } else Swal.fire('เกิดข้อผิดพลาด',res.message,'error');
}

init();
</script>
