    </style>

function getIconHTML(docType) {
    const type = (docType||'').toLowerCase();
    const s = typeStyle[type] || typeStyle.default;
    const svgKey = s.imgKey || s.svgKey || type;
    const svg = ICON_SVG[svgKey] || ICON_SVG[s.icon === 'fa-file-pdf' ? 'pdf' : (s.icon === 'fa-link' ? 'link' : 'default')];
    return `<div class="type-icon-svg" title="${docType}">${svg}</div>`;
}

function toThaiDate(raw) {
    if (!raw) return '-';
    let day, month, year;
    const isoMatch = String(raw).match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (isoMatch) {
        year = parseInt(isoMatch[1]); month = parseInt(isoMatch[2]); day = parseInt(isoMatch[3]);
    } else {
        const d = new Date(raw);
        if (!isNaN(d.getTime())) { day=d.getDate(); month=d.getMonth()+1; year=d.getFullYear(); }
        else return String(raw);
    }
    if (year < 2500) year += 543;
    return `${day}-${month}-${year}`;
}

function toTimestamp(raw) {
    if (!raw) return 0;
    const isoMatch = String(raw).match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (isoMatch) return new Date(`${isoMatch[1]}-${isoMatch[2]}-${isoMatch[3]}`).getTime();
    const d = new Date(raw);
    return isNaN(d.getTime()) ? 0 : d.getTime();
}

function toDrivePreviewUrl(url) {
    // Google Drive /file/d/ID/view → /file/d/ID/preview
    const m = url.match(/drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]{10,})/);
    if (m) return 'https://drive.google.com/file/d/' + m[1] + '/preview';
    // open?id= or uc?id=
    const m2 = url.match(/[?&]id=([a-zA-Z0-9_-]{10,})/);
    if (m2) return 'https://drive.google.com/file/d/' + m2[1] + '/preview';
    return url;
}
function openLightbox(url) {
    const previewUrl = toDrivePreviewUrl(url);
    const frame = document.getElementById('lightbox-frame');
    const spinner = document.getElementById('lightbox-spinner');
    spinner.style.display = 'flex';
    frame.src = previewUrl;
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
}
function closeLightbox(e, force=false) {
    if (force || (e && e.target === document.getElementById('lightbox'))) {
        document.getElementById('lightbox').classList.remove('open');
        document.getElementById('lightbox-frame').src = '';
        document.getElementById('lightbox-spinner').style.display = 'flex';
        document.body.style.overflow = '';
    }
}
document.addEventListener('keydown', e => { if(e.key==='Escape') closeLightbox(null,true); });

async function init() { await loadDataFromSheet(); }

async function loadDataFromSheet() {
    try {
        const res = await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({action:'getList'}) });
        const result = await res.json();
        if (result.status === 'success') {
            documents = result.data.sort((a,b) => toTimestamp(b.date) - toTimestamp(a.date));
            updateCategoryDropdown();
            renderList();
        }
    } catch(err) { console.error("Fetch Error:", err); }
}

function renderList() {
    const container = document.getElementById("docList");
    const empty = document.getElementById("emptyState");
    const search = document.getElementById("searchInput").value.toLowerCase();
    const cat = document.getElementById("filterCategory").value;

    const filtered = documents.filter(d =>
        d.name.toLowerCase().includes(search) && (cat === "" || d.category === cat)
    );

    container.innerHTML = "";
    if (filtered.length === 0) {
        empty.classList.remove('hidden');
    } else {
        empty.classList.add('hidden');
        filtered.forEach(doc => {
            const isImage = IMAGE_TYPES.has((doc.type||'').toLowerCase());
            const displayDate = toThaiDate(doc.date);

            const deleteBtn = isAdmin ? `
                <button onclick="deleteDoc('${doc.id}')" class="absolute top-2 right-2 w-7 h-7 bg-red-50 text-red-500 hover:bg-red-500 hover:text-white rounded-full transition flex items-center justify-center border border-red-100 shadow-sm z-10">
                    <i class="fas fa-trash-can text-[10px]"></i>
                </button>` : '';

            const imagePreview = ''; // thumbnail removed

            const actionButtons = isImage ? `
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="openLightbox('${doc.url}')" class="flex items-center justify-center gap-2 py-2 rounded-xl bg-pink-50 text-pink-600 hover:bg-pink-100 transition border border-pink-100 text-[11px] font-bold">
                        <i class="fas fa-image"></i> ดูรูป
                    </button>
                    <a href="${doc.url}" target="_blank" class="flex items-center justify-center gap-2 py-2 rounded-xl bg-emerald-500 text-white text-[11px] font-bold hover:bg-emerald-600 transition shadow-md">
                        <i class="fas fa-download"></i> ดาวน์โหลด
                    </a>
                </div>` : `
                <div class="grid grid-cols-2 gap-2">
                    <a href="${doc.url}" target="_blank" class="flex items-center justify-center gap-2 py-2 rounded-xl bg-slate-50 text-slate-500 hover:text-blue-600 hover:bg-blue-50 transition border border-slate-100 text-[11px] font-bold">
                        <i class="fas fa-eye"></i> ดูตัวอย่าง
                    </a>
                    <a href="${doc.url}" target="_blank" class="flex items-center justify-center gap-2 py-2 rounded-xl bg-emerald-500 text-white text-[11px] font-bold hover:bg-emerald-600 transition shadow-md">
                        <i class="fas fa-download"></i> ดาวน์โหลด
                    </a>
                </div>`;

            container.innerHTML += `
                <div class="doc-card bg-white p-5 rounded-2xl flex flex-col overflow-hidden">
                    ${deleteBtn}
                    ${imagePreview}
                    <div class="flex items-start gap-4 mb-6">
                        ${getIconHTML(doc.type)}
                        <div class="min-w-0 pr-4">
                            <h4 class="font-bold text-slate-800 text-sm leading-snug mb-1 line-clamp-2" title="${doc.name}">${doc.name}</h4>
                            <span class="inline-block text-[9px] font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded-md uppercase tracking-wider border border-blue-100">${doc.category}</span>
                        </div>
                    </div>
                    <div class="pt-4 border-t border-slate-50 flex flex-col gap-3">
                        <div>
                            <p class="text-[9px] uppercase font-bold text-slate-400 tracking-tight">บันทึกเมื่อ</p>
                            <p class="text-[11px] font-semibold text-slate-600">${displayDate}</p>
                        </div>
                        ${actionButtons}
                    </div>
                </div>`;
        });
    }
}

function updateCategoryDropdown() {
    const select = document.getElementById("filterCategory");
    const currentVal = select.value;
    const defaultCats = ["เอกสาร","รูปภาพ","มัลติมีเดีย"];
    const dynamicCats = [...new Set(documents.map(d => d.category))];
    const allCats = [...new Set([...defaultCats, ...dynamicCats])];
    select.innerHTML = '<option value="">ทั้งหมด</option>';
    allCats.forEach(c => { if(c) select.innerHTML += `<option value="${c}">${c}</option>`; });
    select.value = currentVal;
}

function filterData() { renderList(); }

async function toggleAdmin() {
    if (!isAdmin) {
        const { value: password } = await Swal.fire({
            title: 'รหัสผ่านแอดมิน', input: 'password',
            inputPlaceholder: 'กรอกรหัสผ่านเพื่อจัดการระบบ',
            showCancelButton: true, confirmButtonText: 'ยืนยัน', confirmButtonColor: '#3b82f6'
        });
        if (password) {
            Swal.fire({ title: 'กำลังตรวจสอบ...', didOpen: () => Swal.showLoading() });
            try {
                const res = await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({action:'checkAuth', password}) });
                const r = await res.json();
                if (r.status === 'success') { isAdmin=true; applyAdminUI(); Swal.fire({icon:'success',title:'เข้าสู่โหมดแอดมิน',timer:1000,showConfirmButton:false}); }
                else Swal.fire('ล้มเหลว','รหัสผ่านไม่ถูกต้อง','error');
            } catch(e) { Swal.fire('Error','การเชื่อมต่อผิดพลาด','error'); }
        }
    } else { isAdmin=false; applyAdminUI(); }
}

function applyAdminUI() {
    document.getElementById("adminBadge").classList.toggle('hidden',!isAdmin);
    document.getElementById("addBtnArea").classList.toggle('hidden',!isAdmin);
    const btn = document.getElementById("adminBtn");
    btn.innerHTML = isAdmin ? '<i class="fas fa-sign-out-alt mr-2"></i>ปิดโหมดแอดมิน' : '<i class="fas fa-cog mr-2"></i>จัดการระบบ';
    btn.className = isAdmin ? 'bg-orange-500 hover:bg-orange-600 text-white px-5 py-2 rounded-xl text-sm font-semibold transition shadow-md' : 'bg-slate-800 hover:bg-slate-700 text-white px-5 py-2 rounded-xl text-sm font-semibold transition shadow-md';
    renderList();
}

async function addDocument() {
    let uploadType = 'file';
    const { value: formValues } = await Swal.fire({
        title: 'เพิ่มข้อมูลใหม่',
        html: `<div id="swal-container" class="text-left mt-4">
            <div class="flex justify-between items-center mb-2">
                <label id="input-label" class="text-[11px] font-bold text-slate-400 uppercase">1. เลือกไฟล์ (ไม่เกิน 20MB)</label>
                <button type="button" id="toggle-method" class="text-[10px] text-blue-600 font-bold hover:underline">สลับไปวางลิงก์แทน</button>
            </div>
            <div id="file-input-area"><input id="swal-file" type="file" class="swal2-file !m-0 !w-full !text-sm border-slate-200"></div>
            <div id="link-input-area" class="hidden"><input id="swal-link" class="swal2-input !m-0 !w-full !text-sm" placeholder="วางลิงก์ Google Drive..."></div>
            <div class="mt-4">
                <label class="text-[11px] font-bold text-slate-400 uppercase">2. หมวดหมู่</label>
                <select id="swal-cat" class="swal2-input !m-0 !mt-1 !w-full !text-sm">
                    <option value="เอกสาร">เอกสาร</option>
                    <option value="รูปภาพ">รูปภาพ</option>
                    <option value="มัลติมีเดีย">มัลติมีเดีย</option>
                </select>
            </div></div>`,
        showCancelButton: true, confirmButtonText: 'บันทึกข้อมูล',
        didOpen: () => {
            const t = document.getElementById('toggle-method');
            t.onclick = () => {
                uploadType = uploadType==='file' ? 'link' : 'file';
                document.getElementById('file-input-area').classList.toggle('hidden');
                document.getElementById('link-input-area').classList.toggle('hidden');
                document.getElementById('input-label').innerText = uploadType==='file' ? '1. เลือกไฟล์ (ไม่เกิน 20MB)' : '1. วางลิงก์เอกสาร';
                t.innerText = uploadType==='file' ? 'สลับไปวางลิงก์แทน' : 'สลับไปอัปโหลดไฟล์';
            };
        },
        preConfirm: () => {
            const cat = document.getElementById('swal-cat').value;
            if (uploadType==='file') {
                const file = document.getElementById('swal-file').files[0];
                if (!file) return Swal.showValidationMessage('กรุณาเลือกไฟล์');
                if (file.size > 20*1024*1024) return Swal.showValidationMessage('ไฟล์ใหญ่เกิน 20MB');
                return { type:'file', file, category:cat };
            } else {
                const link = document.getElementById('swal-link').value;
                if (!link||!link.includes('http')) return Swal.showValidationMessage('กรุณาวางลิงก์ที่ถูกต้อง');
                return { type:'link', link, category:cat };
            }
        }
    });
    if (formValues) {
        if (formValues.type==='file') uploadProcess(formValues.file, formValues.category);
        else saveLinkProcess(formValues.link, formValues.category);
    }
}

async function uploadProcess(file, category) {
    let timerInterval;
    Swal.fire({
        title: 'กำลังอัปโหลดไฟล์...',
        html: `<div class="mt-3"><div class="w-full bg-slate-100 rounded-full h-4 relative overflow-hidden"><div id="upload-progress-bar" class="bg-emerald-500 h-full transition-all duration-300" style="width:0%"></div></div><p id="upload-text" class="text-sm font-bold mt-2 text-slate-600">0%</p></div>`,
        allowOutsideClick: false, showConfirmButton: false,
        didOpen: () => {
            let p=0;
            timerInterval = setInterval(()=>{ if(p<90){p+=5; document.getElementById('upload-progress-bar').style.width=p+'%'; document.getElementById('upload-text').innerText=p+'%'; } },400);
        }
    });
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = async () => {
        try {
            const res = await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'upload',base64:reader.result,fileName:file.name,category})});
            finishProcess(await res.json(), timerInterval);
        } catch(e) { finishProcess({status:'error',message:e.message}, timerInterval); }
    };
}

async function saveLinkProcess(link, category) {
    Swal.fire({ title:'กำลังบันทึก...', didOpen:()=>Swal.showLoading() });
    try {
        const res = await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'upload',base64:'link',fileName:link,category})});
        finishProcess(await res.json());
    } catch(e) { finishProcess({status:'error',message:e.message}); }
}

async function deleteDoc(id) {
    const result = await Swal.fire({
        title:'ยืนยันการลบ?', text:'ข้อมูลนี้จะถูกลบออกจากระบบอย่างถาวร', icon:'warning',
        showCancelButton:true, confirmButtonColor:'#ef4444', cancelButtonColor:'#64748b',
        confirmButtonText:'ใช่, ลบเลย!', cancelButtonText:'ยกเลิก'
    });
    if (result.isConfirmed) {
        Swal.fire({title:'กำลังลบ...',didOpen:()=>Swal.showLoading()});
        try {
            const res = await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'delete',id})});
            const r = await res.json();
            if (r.status==='success') { Swal.fire({icon:'success',title:'ลบสำเร็จ',timer:1000,showConfirmButton:false}); loadDataFromSheet(); }
            else throw new Error(r.message);
        } catch(e) { Swal.fire('ล้มเหลว',e.message,'error'); }
    }
}

function finishProcess(res, interval=null) {
    if (interval) clearInterval(interval);
    if (res.status==='success') {
        if(document.getElementById('upload-progress-bar')) {
            document.getElementById('upload-progress-bar').style.width='100%';
            document.getElementById('upload-text').innerText='100%';
        }
        setTimeout(()=>{ Swal.fire({icon:'success',title:'สำเร็จ!',timer:1500,showConfirmButton:false}); loadDataFromSheet(); },500);
    } else Swal.fire('ผิดพลาด',res.message,'error');
}

init();
