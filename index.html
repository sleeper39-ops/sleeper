<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cougar2 Docks UI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3498db;
            --danger: #e74c3c;
            --success: #27ae60;
            --warning: #f39c12;
            --secondary: #95a5a6;
            --bg-body: #f0f2f5;
            --nav-bg: #0f1923;
            --nav-h: 58px;
            --accent: #3498db;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            display: flex; flex-direction: column;
            font-family: 'Sarabun', sans-serif;
            background: var(--bg-body);
            height: 100vh; overflow: hidden;
        }

        /* ── TOPBAR ── */
        .topbar {
            height: var(--nav-h); background: var(--nav-bg);
            display: flex; align-items: center; padding: 0 20px; gap: 0;
            flex-shrink: 0; box-shadow: 0 2px 16px rgba(0,0,0,0.35);
            position: relative; z-index: 100;
        }
        .topbar-logo {
            font-family: 'Rajdhani', sans-serif; font-size: 1.5rem; font-weight: 700;
            color: white; letter-spacing: 2px; padding-right: 24px; margin-right: 8px;
            border-right: 1px solid rgba(255,255,255,0.1); white-space: nowrap;
            display: flex; align-items: center; gap: 8px;
        }
        .topbar-logo span { color: var(--accent); }
        .topbar-nav {
            display: flex; align-items: center; flex: 1; height: 100%;
            overflow-x: auto; scrollbar-width: none;
        }
        .topbar-nav::-webkit-scrollbar { display: none; }
        .nav-item {
            height: var(--nav-h); display: flex; align-items: center; gap: 7px;
            padding: 0 16px; color: rgba(255,255,255,0.55); font-size: 13px;
            font-weight: 600; cursor: pointer; white-space: nowrap;
            border-bottom: 3px solid transparent;
            transition: color 0.2s, border-color 0.2s, background 0.2s;
            letter-spacing: 0.3px; user-select: none;
        }
        .nav-item i { font-size: 14px; }
        .nav-item:hover { color: white; background: rgba(255,255,255,0.06); }
        .nav-item.active { color: white; border-bottom-color: var(--accent); background: rgba(52,152,219,0.1); }

        /* เมนูลิงก์ภายนอก — ใช้ <a> สไตล์เหมือน nav-item */
        .nav-link {
            height: var(--nav-h); display: flex; align-items: center; gap: 7px;
            padding: 0 16px; color: rgba(255,255,255,0.55); font-size: 13px;
            font-weight: 600; white-space: nowrap; text-decoration: none;
            border-bottom: 3px solid transparent;
            transition: color 0.2s, border-color 0.2s, background 0.2s;
            letter-spacing: 0.3px;
        }
        .nav-link:hover { color: white; background: rgba(255,255,255,0.06); }
        .nav-link i { font-size: 14px; }

        /* ── CONTENT ── */
        .content-wrap { flex: 1; overflow: hidden; position: relative; }

        .page-content {
            display: none; height: 100%;
            animation: fadeUp 0.3s ease;
        }
        .page-content.active {
            display: flex; flex-direction: column;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .page-content iframe { flex: 1; border: none; width: 100%; height: 100%; }

        /* ── หน้าหลัก เปล่าๆ ── */
        #dash-page.active {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100%; overflow-y: auto;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .home-hero {
            text-align: center;
            margin-bottom: 40px;
        }
        .home-hero .logo-big {
            font-family: 'Rajdhani', sans-serif; font-size: 4rem; font-weight: 700;
            color: #1a2a3a; letter-spacing: 4px; line-height: 1;
            display: flex; align-items: center; justify-content: center; gap: 16px;
        }
        .home-hero .logo-big span { color: var(--accent); }
        .home-hero .tagline {
            font-size: 15px; color: #666; margin-top: 12px; letter-spacing: 1px;
            font-weight: 500;
        }

        /* ── MENU GRID SYSTEM ── */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(4, 260px);
            gap: 28px;
            justify-content: center;
            width: 100%;
            max-width: 1200px;
            margin-top: 15px;
        }
        .menu-card {
            background: white;
            border-radius: 20px;
            padding: 40px 24px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 6px 24px rgba(0,0,0,0.05);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            border: 1px solid rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .menu-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 16px 36px rgba(52, 152, 219, 0.18);
            border-color: rgba(52, 152, 219, 0.3);
        }
        .card-icon {
            width: 76px;
            height: 76px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }
        .menu-card:hover .card-icon {
            transform: scale(1.1) rotate(5deg);
        }
        
        /* Icon backgrounds with brand accent colors */
        .icon-resume { background: rgba(52, 152, 219, 0.1); color: #3498db; }
        .icon-edoc { background: rgba(155, 89, 182, 0.1); color: #9b59b6; }
        .icon-live { background: rgba(231, 76, 60, 0.1); color: #e74c3c; }
        .icon-cal { background: rgba(46, 204, 113, 0.1); color: #2ecc71; }
        .icon-qr { background: rgba(241, 196, 15, 0.12); color: #f1c40f; }

        .menu-card h3 {
            font-size: 22px;
            color: #2c3e50;
            margin-bottom: 10px;
            font-weight: 600;
        }
        .menu-card p {
            font-size: 14.5px;
            color: #7f8c8d;
            line-height: 1.4;
        }

        /* ── Mobile ── */
        @media (max-width: 992px) {
            .menu-grid {
                grid-template-columns: repeat(2, 260px);
            }
        }
        @media (max-width: 600px) {
            .home-hero .logo-big { font-size: 2.4rem; gap: 10px; }
            .home-hero .logo-big i { font-size: 2rem !important; }
            .nav-item, .nav-link { padding: 0 12px; font-size: 12px; }
            .topbar-logo { font-size: 1.1rem; padding-right: 12px; }
            .menu-grid {
                grid-template-columns: 1fr;
                padding: 0 10px;
                gap: 16px;
            }
            .menu-card {
                padding: 20px;
                flex-direction: row;
                text-align: left;
                align-items: center;
                justify-content: flex-start;
                gap: 16px;
            }
            .card-icon {
                margin-bottom: 0;
                width: 48px;
                height: 48px;
                font-size: 18px;
                flex-shrink: 0;
            }
            .menu-card h3 {
                margin-bottom: 2px;
                font-size: 16px;
            }
            .menu-card p {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

<!-- TOP NAV BAR -->
<nav class="topbar">
    <div class="topbar-logo" style="cursor: pointer;" onclick="window.showPage('dash-page', document.getElementById('nav-dash'))">
        <i class="fas fa-dog" style="color:var(--accent);font-size:1.1rem;"></i>
        COUGAR<span>2</span>
    </div>
    <div class="topbar-nav">
        <div class="nav-item active" id="nav-dash"     onclick="window.showPage('dash-page', this)"><i class="fas fa-home"></i> หน้าหลัก</div>
    </div>
</nav>

<!-- CONTENT -->
<div class="content-wrap">

    <!-- หน้าหลัก เปล่าๆ -->
    <div id="dash-page" class="page-content active">
        <div class="home-hero">
            <div class="logo-big"><i class="fas fa-dog" style="color:#3498db;font-size:3.2rem;"></i> COUGAR<span>2</span></div>
            <div class="tagline">ยินดีต้อนรับสู่ระบบควบคุมและจัดการส่วนตัว เลือกกล่องเมนูด้านล่างเพื่อเริ่มต้น</div>
        </div>
        
        <div class="menu-grid">
            <div class="menu-card" onclick="window.showPage('resume-page')">
                <div class="card-icon icon-resume"><i class="fas fa-id-card"></i></div>
                <h3>Personnel System</h3>
                <p>ระบบจัดการข้อมูลบุคลากร</p>
            </div>
            <div class="menu-card" onclick="window.showPage('edoc-page')">
                <div class="card-icon icon-edoc"><i class="fas fa-file-alt"></i></div>
                <h3>E-doc</h3>
                <p>ระบบจัดการเอกสาร</p>
            </div>
            <div class="menu-card" onclick="window.showPage('live-page')">
                <div class="card-icon icon-live"><i class="fas fa-video"></i></div>
                <h3>กล้องสด</h3>
                <p>กล้องวงจรปิดแบบสด</p>
            </div>
            <div class="menu-card" onclick="window.showPage('calendar-page')">
                <div class="card-icon icon-cal"><i class="fas fa-calendar-alt"></i></div>
                <h3>ปฏิทิน</h3>
                <p>ตารางและกิจกรรม</p>
            </div>
            <div class="menu-card" onclick="window.showPage('qrcode-page')">
                <div class="card-icon icon-qr"><i class="fas fa-qrcode"></i></div>
                <h3>QR Code</h3>
                <p>แปลงลิงก์เป็น QR Code</p>
            </div>
        </div>
    </div>
    <div id="resume-page"   class="page-content"><iframe src="personal.html"></iframe></div>
    <div id="edoc-page"     class="page-content"><iframe src="e-doc.html"></iframe></div>
    <div id="live-page"     class="page-content"><iframe src="cctv.html"></iframe></div>
    <div id="calendar-page" class="page-content"><iframe src="calendar.html"></iframe></div>
    <div id="qrcode-page"   class="page-content"><iframe src="qrcode.html"></iframe></div>

</div>

<script>
    window.showPage = function(id, el) {
        document.querySelectorAll('.page-content').forEach(function(p) {
            p.classList.remove('active');
        });
        var pg = document.getElementById(id);
        if (pg) pg.classList.add('active');
        document.querySelectorAll('.nav-item').forEach(function(a) {
            a.classList.remove('active');
        });
        if (el) el.classList.add('active');
    };
</script>
</body>
</html>
